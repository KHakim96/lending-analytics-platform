services:

  postgres:
    image: postgres:16
    container_name: lending_postgres

    restart: always

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile

    container_name: airflow_init

    depends_on:
      - postgres

    volumes:
      - ./dags:/opt/airflow/dags
      - ./:/opt/airflow/project
      - airflow_data:/opt/airflow

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --firstname Luqman
      --lastname Hakim
      --role Admin
      --email admin@example.com
      --password admin
      "

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile

    container_name: airflow_webserver

    depends_on:
      - postgres
      - airflow-init

    ports:
      - "8080:8080"

    volumes:
      - ./dags:/opt/airflow/dags
      - ./:/opt/airflow/project
      - airflow_data:/opt/airflow

    command: webserver

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile

    container_name: airflow_scheduler

    depends_on:
      - postgres
      - airflow-init

    volumes:
      - ./dags:/opt/airflow/dags
      - ./:/opt/airflow/project
      - airflow_data:/opt/airflow

    command: scheduler

volumes:
  postgres_data:
  airflow_data: